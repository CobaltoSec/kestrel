name: CI

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ scripts/ --exit-zero

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests (no e2e / kali / htb / msf)
        run: |
          pytest tests/ -v --tb=short -m "not e2e and not kali and not htb and not msf"

  e2e-gated:
    # Only run on tag push to v0.4.x — gated to keep CI fast on every commit
    if: startsWith(github.ref, 'refs/tags/v0.4')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + run e2e
        env:
          KESTREL_E2E: "1"
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v -m e2e
